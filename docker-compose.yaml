services:
    log-pipeline-db:
        image: postgres:16
        container_name: log-pipeline-db
        ports:
            - "${DB_PORT:-5432}:5432"
        environment:
            POSTGRES_USER: ${DB_USER:-postgres}
            POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
            POSTGRES_DB: ${DB_NAME:-logpipeline}
        volumes:
            - pgdata:/var/lib/postgresql/data
        restart: unless-stopped
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
                ]
            interval: 5s
            timeout: 5s
            retries: 5

    log-pipeline-redis:
        image: redis:7
        container_name: log-pipeline-redis
        ports:
            - "${REDIS_PORT:-6379}:6379"
        volumes:
            - redisdata:/data
        restart: unless-stopped
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 5s
            retries: 5

volumes:
    pgdata:
        driver: local
    redisdata:
        driver: local
