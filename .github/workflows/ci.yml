name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

env:
    GO_VERSION: "1.26"

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-go@v5
              with:
                  go-version: ${{ env.GO_VERSION }}
            - name: Install golangci-lint
              run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
            - name: Run golangci-lint
              run: golangci-lint run

    test:
        runs-on: ubuntu-latest
        needs: lint
        services:
            postgres:
                image: postgres:16
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: logpipeline
                ports: ["5432:5432"]
                options: >-
                    --health-cmd pg_isready
                    --health-interval 5s
                    --health-timeout 5s
                    --health-retries 5
            redis:
                image: redis:7
                ports: ["6379:6379"]
                options: >-
                    --health-cmd "redis-cli ping"
                    --health-interval 5s
                    --health-timeout 5s
                    --health-retries 5
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-go@v5
              with:
                  go-version: ${{ env.GO_VERSION }}

            - name: Run migrations
              run: |
                  go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest
                  migrate -path migrations -database "postgres://postgres:postgres@localhost:5432/logpipeline?sslmode=disable" up

            - name: Run tests
              run: go test ./... -v
              env:
                  REDIS_ADDR: localhost:6379
                  DB_HOST: localhost
                  DB_PORT: "5432"
                  DB_USER: postgres
                  DB_PASSWORD: postgres
                  DB_NAME: logpipeline

    build-and-push:
        runs-on: ubuntu-latest
        needs: [lint, test]
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        strategy:
            matrix:
                service:
                    [
                        ingest,
                        consumer,
                        query,
                        api-gateway,
                        order-service,
                        payment-service,
                        inventory-service,
                    ]
        permissions:
            contents: read
            packages: write
        steps:
            - uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Determine build path
              id: path
              run: |
                  if [[ "${{ matrix.service }}" == "ingest" || "${{ matrix.service }}" == "consumer" || "${{ matrix.service }}" == "query" ]]; then
                    echo "path=./cmd/${{ matrix.service }}" >> "$GITHUB_OUTPUT"
                  else
                    echo "path=./demo/${{ matrix.service }}" >> "$GITHUB_OUTPUT"
                  fi

            - name: Build and push
              uses: docker/build-push-action@v6
              with:
                  context: .
                  build-args: |
                      SERVICE_PATH=${{ steps.path.outputs.path }}
                  push: true
                  tags: |
                      ghcr.io/${{ github.repository_owner }}/log-pipeline-${{ matrix.service }}:latest
                      ghcr.io/${{ github.repository_owner }}/log-pipeline-${{ matrix.service }}:${{ github.sha }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
